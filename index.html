<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAME</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        body { font-family: 'Crimson Pro', serif; margin: 0; overflow: hidden; background-color: #f4ede0; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        svg { user-select: none; -webkit-user-select: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c9b89a; border-radius: 10px; }
        .tile-shadow { filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.25)); }
        .glass-panel { background: rgba(250, 246, 237, 0.95); backdrop-filter: blur(8px); }
        .toast-enter { animation: fadeUp 0.3s forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CELL = 100;
        const C = {
            black: '#1a1815', amber: '#b8500e', bg: '#f4ede0',
            bgLight: '#faf6ed', bgDark: '#e8dcc0', text: '#3a2e1f',
            textMuted: '#8b7a5e', line: '#c9b89a',
        };

        const IconSkip = ({size=22}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>;
        const IconRefresh = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>;
        const IconInfo = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconX = ({size=22}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconTrophy = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconChevronLeft = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const IconChevronRight = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const IconChevronsLeft = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>;
        const IconChevronsRight = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>;
        const IconShare = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>;

        function analyzeBoard(tiles) {
            const tileKeys = Object.keys(tiles);
            const emptyState = {
                dead: new Set(), territoriesByColor: { black: new Set(), amber: new Set() },
                prisonersByColor: { black: new Set(), amber: new Set() }, closedCells: new Set(), territories: [],
                breakdown: { black: { vacant: 0, prisoners: 0 }, amber: { vacant: 0, prisoners: 0 } },
            };
            if (tileKeys.length === 0) return emptyState;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const k of tileKeys) {
                const [x, y] = k.split(',').map(Number);
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
            minX -= 1; maxX += 1; minY -= 1; maxY += 1;
            const inBox = (x, y) => x >= minX && x <= maxX && y >= minY && y <= maxY;

            const exterior = new Set();
            const q = [];
            for (let x = minX; x <= maxX; x++) {
                for (const y of [minY, maxY]) {
                    const k = `${x},${y}`; if (!tiles[k]) { exterior.add(k); q.push([x, y]); }
                }
            }
            for (let y = minY; y <= maxY; y++) {
                for (const x of [minX, maxX]) {
                    const k = `${x},${y}`; if (!tiles[k] && !exterior.has(k)) { exterior.add(k); q.push([x, y]); }
                }
            }
            while (q.length) {
                const [x, y] = q.pop();
                for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                    const nx = x + dx, ny = y + dy;
                    if (!inBox(nx, ny)) continue;
                    const nk = `${nx},${ny}`;
                    if (!tiles[nk] && !exterior.has(nk)) { exterior.add(nk); q.push([nx, ny]); }
                }
            }

            const dead = new Set();
            const checkedStones = new Set();

            for (const startKey of tileKeys) {
                if (checkedStones.has(startKey)) continue;
                const startColor = tiles[startKey];
                const componentStones = new Set();
                const stack = [startKey];
                let isAlive = false;

                while (stack.length) {
                    const k = stack.pop();
                    if (checkedStones.has(k)) continue;
                    checkedStones.add(k);
                    componentStones.add(k);
                    const [cx, cy] = k.split(',').map(Number);
                    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                        const nx = cx + dx, ny = cy + dy;
                        const nk = `${nx},${ny}`;
                        if (!tiles[nk]) { isAlive = true; } 
                        else if (tiles[nk] === startColor) { if (!checkedStones.has(nk)) stack.push(nk); }
                    }
                }
                if (!isAlive) { for (const stoneKey of componentStones) dead.add(stoneKey); }
            }

            const territoriesByColor = { black: new Set(), amber: new Set() };
            const prisonersByColor = { black: new Set(), amber: new Set() };
            const closedCells = new Set();
            const territories = [];

            const findTerritories = (owner, opponent) => {
                const visitedRegion = new Set();
                for (let x = minX; x <= maxX; x++) {
                    for (let y = minY; y <= maxY; y++) {
                        const k = `${x},${y}`;
                        if (visitedRegion.has(k) || exterior.has(k)) continue;
                        const isWalkable = !tiles[k] || (tiles[k] === opponent && dead.has(k));
                        if (!isWalkable) continue;
                        const regionCells = [];
                        const boundaryColors = new Set();
                        const stack = [[x, y]];
                        visitedRegion.add(k);
                        while (stack.length) {
                            const [cx, cy] = stack.pop();
                            const ck = `${cx},${cy}`;
                            regionCells.push(ck);
                            for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                                const nx = cx + dx, ny = cy + dy; if (!inBox(nx, ny)) continue;
                                const nk = `${nx},${ny}`;
                                if (exterior.has(nk)) { boundaryColors.add('exterior'); continue; }
                                const nIsWalkable = !tiles[nk] || (tiles[nk] === opponent && dead.has(nk));
                                if (nIsWalkable) { if (!visitedRegion.has(nk)) { visitedRegion.add(nk); stack.push([nx, ny]); } } 
                                else { boundaryColors.add(tiles[nk]); }
                            }
                        }
                        if (boundaryColors.size === 1 && boundaryColors.has(owner)) {
                            for (const ck of regionCells) {
                                territoriesByColor[owner].add(ck);
                                if (tiles[ck] === opponent) prisonersByColor[owner].add(ck);
                                closedCells.add(ck);
                            }
                            territories.push({ owner, cells: regionCells });
                        }
                    }
                }
            };
            findTerritories('black', 'amber');
            findTerritories('amber', 'black');
            return { dead, territoriesByColor, prisonersByColor, closedCells, territories,
                breakdown: { black: { vacant: territoriesByColor.black.size, prisoners: prisonersByColor.black.size },
                             amber: { vacant: territoriesByColor.amber.size, prisoners: prisonersByColor.amber.size } } };
        }

        function PlayerBadge({ color, left, active, score }) {
            const pc = color === 'black' ? C.black : C.amber;
            return (
                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-lg transition-all duration-300 ${active ? 'shadow-md scale-105' : 'opacity-80 scale-100'}`} style={{ backgroundColor: active ? pc : 'transparent', color: active ? '#fff' : C.text, border: `2px solid ${active ? pc : C.line}` }}>
                    <div className="w-3 h-3 rounded-sm flex-shrink-0 shadow-sm" style={{ backgroundColor: active ? '#fff' : pc }} />
                    <div className="flex flex-col leading-none">
                        <span className="text-[10px] tracking-widest uppercase opacity-80 mb-0.5">{color === 'black' ? 'Black' : 'Amber'}</span>
                        <div className="flex items-baseline gap-1.5">
                            <span className="text-base font-bold tabular-nums">{Number.isInteger(score) ? score : Number(score).toFixed(1)}</span>
                            <span className="text-[11px] opacity-70 tabular-nums font-medium">· {left} left</span>
                        </div>
                    </div>
                </div>
            );
        }

        function RulesModal({ onClose }) {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity backdrop-blur-sm" style={{ backgroundColor: 'rgba(0,0,0,0.4)' }} onClick={onClose}>
                    <div className="w-full max-w-lg max-h-[85vh] overflow-y-auto rounded-2xl shadow-2xl transform transition-all" style={{ backgroundColor: C.bgLight, color: C.text }} onClick={(e) => e.stopPropagation()}>
                        <div className="sticky top-0 flex items-center justify-between p-5 border-b glass-panel z-10" style={{ borderColor: C.line }}>
                            <h2 className="font-serif text-2xl font-bold tracking-widest text-amber-900">HOW TO PLAY</h2>
                            <button onClick={onClose} className="p-2 rounded-full hover:bg-black/5 transition-colors"><IconX size={24} /></button>
                        </div>
                        <div className="p-6 space-y-6 text-base leading-relaxed font-serif">
                            <div className="bg-white/50 p-4 rounded-xl border border-amber-900/10">
                                <h3 className="font-bold text-lg mb-2 text-amber-800 flex items-center gap-2"><span className="bg-amber-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span> Placement</h3>
                                <p>The first tile (Seed) can be placed anywhere. Every subsequent tile must be placed orthogonally adjacent (up, down, left, right) to at least one existing tile. <strong>Rule:</strong> You cannot place a tile inside a 4-sided hole <em>unless</em> that move immediately completes a circuit for your color.</p>
                            </div>
                            <div className="bg-white/50 p-4 rounded-xl border border-amber-900/10">
                                <h3 className="font-bold text-lg mb-2 text-amber-800 flex items-center gap-2"><span className="bg-amber-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span> Passing & Ending</h3>
                                <p>On your turn, you may choose to pass. If both players pass consecutively, the game ends. The game also automatically ends if no one has tiles left.</p>
                            </div>
                            <div className="bg-white/50 p-4 rounded-xl border border-amber-900/10">
                                <h3 className="font-bold text-lg mb-2 text-amber-800 flex items-center gap-2"><span className="bg-amber-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">3</span> Captures (Death)</h3>
                                <p>A connected group of your tiles is considered <em>"dead"</em> if it is completely cut off from all empty spaces. If a group is fully enclosed within an opponent's territory, it is captured.</p>
                            </div>
                            <div className="bg-white/50 p-4 rounded-xl border border-amber-900/10">
                                <h3 className="font-bold text-lg mb-2 text-amber-800 flex items-center gap-2"><span className="bg-amber-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">4</span> Scoring</h3>
                                <p>You control a territory if its perimeter consists entirely of your color (dead enemy tiles count as walls). Your final score is calculated by:</p>
                                <ul className="list-disc pl-5 mt-2 space-y-1">
                                    <li><strong>+1 point</strong> for each empty space inside your territory.</li>
                                    <li><strong>+1 point</strong> for each dead enemy tile inside (meaning a dead tile yields 2 points in total: 1 for its space + 1 for the capture).</li>
                                    <li><strong>Komi</strong> (compensation points) is added to the chosen player's score to balance the first-mover advantage.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [phase, setPhase] = useState('setup');
            const [tilesInput, setTilesInput] = useState('35');
            const [komiInput, setKomiInput] = useState('0');
            const [komiTo, setKomiTo] = useState('black');
            const [history, setHistory] = useState([]);
            const [currentStep, setCurrentStep] = useState(0);
            const [showRules, setShowRules] = useState(false);
            const [toast, setToast] = useState('');

            useEffect(() => {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#t=')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const t = params.get('t'), k = params.get('k'), kt = params.get('kt'), m = params.get('m'), s = params.get('s');
                    if (t) setTilesInput(t); if (k) setKomiInput(k); if (kt) setKomiTo(kt);
                    if (m) {
                        const loadedHistory = []; let p = 'black'; const moves = m.split(';').filter(Boolean);
                        for (const moveStr of moves) {
                            if (moveStr === 'p') loadedHistory.push({ type: 'pass', player: p });
                            else loadedHistory.push({ type: 'place', player: p, key: moveStr });
                            p = p === 'black' ? 'amber' : 'black';
                        }
                        setHistory(loadedHistory);
                        setCurrentStep(s ? Math.min(parseInt(s), loadedHistory.length) : loadedHistory.length);
                        setPhase('playing');
                    }
                }
            }, []);

            const { tiles, currentPlayer, blackLeft, amberLeft, lastPassed, consecutivePasses } = useMemo(() => {
                let t = {}, p = 'black', bl = Number(tilesInput) || 35, al = Number(tilesInput) || 35, lp = null, passCount = 0;
                for(let i = 0; i < currentStep; i++) {
                    const m = history[i];
                    if(m.type === 'place') { t[m.key] = m.player; if(m.player === 'black') bl--; else al--; lp = null; passCount = 0; } 
                    else if (m.type === 'pass') { lp = m.player; passCount++; }
                    p = p === 'black' ? 'amber' : 'black';
                }
                return { tiles: t, currentPlayer: p, blackLeft: bl, amberLeft: al, lastPassed: lp, consecutivePasses: passCount };
            }, [history, currentStep, tilesInput]);

            const analysis = useMemo(() => analyzeBoard(tiles), [tiles]);
            const scoring = useMemo(() => {
                const k = Number(komiInput) || 0;
                const b = analysis.breakdown.black.vacant + analysis.breakdown.black.prisoners + (komiTo === 'black' ? k : 0);
                const a = analysis.breakdown.amber.vacant + analysis.breakdown.amber.prisoners + (komiTo === 'amber' ? k : 0);
                return { black: b, amber: a };
            }, [analysis, komiInput, komiTo]);

            const isEnded = (blackLeft <= 0 && amberLeft <= 0) || consecutivePasses >= 2;

            const validPlacements = useMemo(() => {
                const tileKeys = Object.keys(tiles); if (tileKeys.length === 0) return new Set(['0,0']);
                const valid = new Set(), candidates = new Set();
                for (const key of tileKeys) {
                    const [x, y] = key.split(',').map(Number);
                    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                        const nx = x + dx, ny = y + dy, k = `${nx},${ny}`;
                        if (!tiles[k] && !analysis.closedCells.has(k)) candidates.add(k);
                    }
                }
                for (const k of candidates) {
                    const [x, y] = k.split(',').map(Number);
                    let occ = 0; for (const [ddx, ddy] of [[1,0],[-1,0],[0,1],[0,-1]]) if (tiles[`${x+ddx},${y+ddy}`]) occ++;
                    if (occ < 4) { valid.add(k); } 
                    else {
                        const simTiles = { ...tiles, [k]: currentPlayer }, simAnalysis = analyzeBoard(simTiles);
                        if (simAnalysis.territoriesByColor[currentPlayer].size > analysis.territoriesByColor[currentPlayer].size || 
                            simAnalysis.prisonersByColor[currentPlayer].size > analysis.prisonersByColor[currentPlayer].size) { valid.add(k); }
                    }
                }
                return valid;
            }, [tiles, analysis, currentPlayer]);

            const tilesLeftForCurrent = currentPlayer === 'black' ? blackLeft : amberLeft;
            const mustPass = !isEnded && (tilesLeftForCurrent <= 0 || validPlacements.size === 0);

            const startGame = () => { setHistory([]); setCurrentStep(0); setPhase('playing'); };
            const executeMove = (moveObj) => { const newHistory = history.slice(0, currentStep); newHistory.push(moveObj); setHistory(newHistory); setCurrentStep(newHistory.length); };
            const placeTile = (key) => { if (isEnded || phase !== 'playing' || !validPlacements.has(key) || tilesLeftForCurrent <= 0) return; executeMove({ type: 'place', player: currentPlayer, key }); };
            const pass = () => { if (isEnded || phase !== 'playing') return; executeMove({ type: 'pass', player: currentPlayer }); };

            const shareGame = () => {
                const movesStr = history.map(h => h.type === 'pass' ? 'p' : h.key).join(';');
                const hash = `t=${tilesInput}&k=${komiInput}&kt=${komiTo}&m=${movesStr}&s=${currentStep}`;
                const origin = window.location.origin === 'null' ? '' : window.location.origin;
                const url = origin + window.location.pathname + '#' + hash;
                navigator.clipboard.writeText(url).then(() => { setToast('Link copied at Current Move!'); setTimeout(() => setToast(''), 3000); })
                .catch(() => { console.log("URL:", url); setToast('Copied to Console!'); setTimeout(() => setToast(''), 3000); });
            };

            const bbox = useMemo(() => {
                const tk = Object.keys(tiles); if (tk.length === 0) return { minX: -3, maxX: 3, minY: -3, maxY: 3 };
                let x1=Infinity, x2=-Infinity, y1=Infinity, y2=-Infinity;
                tk.forEach(k => { const [x, y] = k.split(',').map(Number); x1=Math.min(x1,x); x2=Math.max(x2,x); y1=Math.min(y1,y); y2=Math.max(y2,y); });
                return { minX: x1-2, maxX: x2+2, minY: y1-2, maxY: y2+2 };
            }, [tiles]);

            if (phase === 'setup') {
                return (
                    <div className="flex flex-col min-h-screen items-center justify-center p-6 bg-gradient-to-br from-[#faf6ed] to-[#e8dcc0]" style={{ color: C.text }}>
                        <div className="w-full max-w-sm bg-white/40 p-8 rounded-3xl shadow-xl border border-white/50 backdrop-blur-md">
                            <div className="text-center mb-8">
                                <h1 className="font-serif text-5xl font-bold tracking-[0.3em] mb-3 text-amber-900 drop-shadow-sm">TRAME</h1>
                                <p className="font-serif italic text-base text-amber-800/70">An abstract strategy game</p>
                            </div>
                            <div className="rounded-2xl p-5 mb-4 bg-white/60 shadow-inner" style={{ border: `1px solid ${C.line}` }}>
                                <p className="text-xs font-serif font-bold tracking-widest uppercase mb-2 text-amber-900 opacity-80">Tiles per player</p>
                                <input type="number" value={tilesInput} onChange={e => setTilesInput(e.target.value)} className="w-full px-4 py-3 rounded-xl font-bold tabular-nums text-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all" style={{ border: `1px solid ${C.line}`, backgroundColor: C.bgLight }} />
                            </div>
                            <div className="rounded-2xl p-5 mb-6 bg-white/60 shadow-inner" style={{ border: `1px solid ${C.line}` }}>
                                <p className="text-xs font-serif font-bold tracking-widest uppercase mb-2 text-amber-900 opacity-80">Compensation</p>
                                <input type="number" step="0.5" value={komiInput} onChange={e => setKomiInput(e.target.value)} className="w-full px-4 py-3 mb-3 rounded-xl font-bold tabular-nums text-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all" style={{ border: `1px solid ${C.line}`, backgroundColor: C.bgLight }} />
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => setKomiTo('black')} className={`py-2 rounded-xl text-sm font-bold transition-all duration-300 ${komiTo === 'black' ? 'shadow-md scale-105' : 'hover:bg-black/5'}`} style={{ backgroundColor: komiTo === 'black' ? C.black : 'transparent', color: komiTo === 'black' ? '#fff' : C.text, border: `2px solid ${komiTo === 'black' ? C.black : C.line}` }}>To Black</button>
                                    <button onClick={() => setKomiTo('amber')} className={`py-2 rounded-xl text-sm font-bold transition-all duration-300 ${komiTo === 'amber' ? 'shadow-md scale-105' : 'hover:bg-amber-900/5'}`} style={{ backgroundColor: komiTo === 'amber' ? C.amber : 'transparent', color: komiTo === 'amber' ? '#fff' : C.text, border: `2px solid ${komiTo === 'amber' ? C.amber : C.line}` }}>To Amber</button>
                                </div>
                            </div>
                            <button onClick={startGame} className="w-full py-4 rounded-xl font-bold tracking-widest text-lg text-white shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300" style={{ backgroundColor: C.amber }}>START GAME</button>
                        </div>
                    </div>
                );
            }

            const viewBox = `${bbox.minX * CELL} ${bbox.minY * CELL} ${(bbox.maxX - bbox.minX + 1) * CELL} ${(bbox.maxY - bbox.minY + 1) * CELL}`;
            let statusText = `It's ${currentPlayer === 'black' ? 'Black' : 'Amber'}'s turn`;
            if (currentStep < history.length && !isEnded) statusText = `Viewing Past (Move ${currentStep})`;
            else if (mustPass) statusText = 'You must pass — no moves or tiles left';
            else if (lastPassed && lastPassed !== currentPlayer && !isEnded) statusText = 'Opponent passed. End game?';
            const winner = isEnded ? (scoring.black > scoring.amber ? 'black' : scoring.amber > scoring.black ? 'amber' : 'tie') : null;
            const fmt = (n) => Number.isInteger(n) ? n : Number(n).toFixed(1);

            return (
                <div className="flex flex-col h-screen" style={{ height: '100dvh' }}>
                    <div className="flex items-center justify-between px-4 py-3 border-b shadow-sm z-10" style={{ borderColor: C.line, backgroundColor: C.bgLight }}>
                        <h1 className="font-serif text-lg font-bold tracking-[0.3em]" style={{ color: C.text }}>TRAME</h1>
                        <div className="flex items-center gap-3">
                            <PlayerBadge color="black" left={blackLeft} active={!isEnded && currentPlayer === 'black'} score={scoring.black} />
                            <PlayerBadge color="amber" left={amberLeft} active={!isEnded && currentPlayer === 'amber'} score={scoring.amber} />
                            <button onClick={() => setShowRules(true)} className="p-2 ml-1 rounded-full hover:bg-black/5 transition-colors"><IconInfo size={20} style={{ color: C.textMuted }} /></button>
                        </div>
                    </div>
                    {!isEnded && <div className={`px-3 py-2 text-sm text-center font-serif font-medium tracking-wide shadow-inner ${currentStep < history.length ? 'bg-amber-200/50' : ''}`} style={{ color: C.text, backgroundColor: currentStep === history.length ? C.bgDark : undefined }}>{statusText}</div>}
                    {isEnded && (
                        <div className="px-3 py-4 text-center shadow-md z-10" style={{ backgroundColor: winner === 'tie' ? C.bgDark : (winner === 'black' ? C.black : C.amber), color: winner === 'tie' ? C.text : '#fff' }}>
                            <div className="flex items-center justify-center gap-2"><IconTrophy size={20} /> <span className="font-serif tracking-widest text-base font-bold">{winner === 'tie' ? `DRAW · ${fmt(scoring.black)} − ${fmt(scoring.amber)}` : `${winner === 'black' ? 'BLACK' : 'AMBER'} WINS · ${fmt(scoring.black)} − ${fmt(scoring.amber)}`}</span></div>
                        </div>
                    )}
                    <div className="flex-1 relative overflow-hidden" style={{ backgroundColor: C.bg }}>
                        <svg viewBox={viewBox} className="absolute inset-0 w-full h-full" preserveAspectRatio="xMidYMid meet">
                            {Array.from({ length: bbox.maxX - bbox.minX + 2 }, (_, i) => <line key={`gx${i}`} x1={(bbox.minX + i) * CELL} y1={bbox.minY * CELL} x2={(bbox.minX + i) * CELL} y2={(bbox.maxY + 1) * CELL} stroke={C.line} strokeWidth="1" opacity="0.4" pointerEvents="none" />)}
                            {Array.from({ length: bbox.maxY - bbox.minY + 2 }, (_, i) => <line key={`gy${i}`} x1={bbox.minX * CELL} y1={(bbox.minY + i) * CELL} x2={(bbox.maxX + 1) * CELL} y2={(bbox.minY + i) * CELL} stroke={C.line} strokeWidth="1" opacity="0.4" pointerEvents="none" />)}
                            {analysis.territories.map((t, ti) => t.cells.map((cellKey) => { const [x, y] = cellKey.split(',').map(Number); return <rect key={`t${ti}_${cellKey}`} x={x * CELL} y={y * CELL} width={CELL} height={CELL} fill={t.owner === 'black' ? C.black : C.amber} opacity={!isEnded ? 0.12 : 0.22} pointerEvents="none" />; }))}
                            {Object.entries(tiles).map(([k, color]) => {
                                const [x, y] = k.split(',').map(Number), isDead = analysis.dead.has(k);
                                return ( <g key={k} pointerEvents="none" className="transition-all duration-300"> <rect x={x * CELL + 4} y={y * CELL + 4} width={CELL - 8} height={CELL - 8} fill={color === 'black' ? C.black : C.amber} rx="12" opacity={isDead ? 0.4 : 1} className="tile-shadow" stroke="rgba(255,255,255,0.15)" strokeWidth="2" /> {!isDead && <rect x={x * CELL + 6} y={y * CELL + 6} width={CELL - 12} height={CELL - 12} fill="none" rx="10" stroke="rgba(255,255,255,0.1)" strokeWidth="2" />} {isDead && ( <g> <line x1={x * CELL + 30} y1={y * CELL + 30} x2={x * CELL + CELL - 30} y2={y * CELL + CELL - 30} stroke={color === 'black' ? C.amber : C.bg} strokeWidth="5" strokeLinecap="round" opacity="0.9" /> <line x1={x * CELL + CELL - 30} y1={y * CELL + 30} x2={x * CELL + 30} y2={y * CELL + CELL - 30} stroke={color === 'black' ? C.amber : C.bg} strokeWidth="5" strokeLinecap="round" opacity="0.9" /> </g> )} </g> );
                            })}
                            {!isEnded && Array.from(validPlacements).map((k) => {
                                const [x, y] = k.split(',').map(Number), isFirst = Object.keys(tiles).length === 0;
                                return ( <g key={`v${k}`}> <rect x={x * CELL} y={y * CELL} width={CELL} height={CELL} fill="transparent" onClick={() => placeTile(k)} style={{ cursor: 'pointer', pointerEvents: 'all' }} /> <rect x={x * CELL + 20} y={y * CELL + 20} width={CELL - 40} height={CELL - 40} fill={currentPlayer === 'black' ? C.black : C.amber} opacity="0.25" rx="8" style={{ pointerEvents: 'none' }} className="transition-opacity duration-200" /> {isFirst && <text x={x * CELL + CELL / 2} y={y * CELL + CELL / 2 + 5} textAnchor="middle" fontSize="16" fontFamily="serif" fontStyle="italic" fontWeight="bold" fill={C.textMuted} style={{ pointerEvents: 'none' }}>Seed</text>} </g> );
                            })}
                        </svg>
                        {toast && <div className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white px-4 py-2 rounded-full text-sm font-sans tracking-wide z-50 toast-enter backdrop-blur-sm"> {toast} </div>}
                    </div>
                    <div className="px-4 py-2 text-xs font-serif text-center z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]" style={{ color: C.text, backgroundColor: C.bgLight, borderTop: `1px solid ${C.line}` }}>
                        <span className="mr-6"><strong className="text-black text-sm">Black</strong>: {analysis.breakdown.black.vacant} terr. + {analysis.breakdown.black.prisoners} capt.</span>
                        <span><strong className="text-amber-700 text-sm">Amber</strong>: {analysis.breakdown.amber.vacant} terr. + {analysis.breakdown.amber.prisoners} capt.</span>
                    </div>
                    <div className="flex flex-col border-t z-10" style={{ borderColor: C.line, backgroundColor: C.bgLight }}>
                        <div className="flex items-center justify-between px-4 py-2 border-b" style={{ borderColor: 'rgba(0,0,0,0.05)', backgroundColor: 'rgba(0,0,0,0.02)' }}>
                            <div className="flex items-center gap-1">
                                <button onClick={() => setCurrentStep(0)} disabled={currentStep === 0} className="p-1.5 rounded-md hover:bg-black/5 disabled:opacity-30 transition-colors"><IconChevronsLeft size={18} /></button>
                                <button onClick={() => setCurrentStep(s => Math.max(0, s - 1))} disabled={currentStep === 0} className="p-1.5 rounded-md hover:bg-black/5 disabled:opacity-30 transition-colors"><IconChevronLeft size={18} /></button>
                            </div>
                            <span className="text-[11px] font-bold font-serif tracking-widest uppercase opacity-70"> Move {currentStep} / {history.length} </span>
                            <div className="flex items-center gap-1">
                                <button onClick={() => setCurrentStep(s => Math.min(history.length, s + 1))} disabled={currentStep === history.length} className="p-1.5 rounded-md hover:bg-black/5 disabled:opacity-30 transition-colors"><IconChevronRight size={18} /></button>
                                <button onClick={() => setCurrentStep(history.length)} disabled={currentStep === history.length} className="p-1.5 rounded-md hover:bg-black/5 disabled:opacity-30 transition-colors"><IconChevronsRight size={18} /></button>
                            </div>
                        </div>
                        <div className="flex items-center justify-around p-3">
                            <button onClick={shareGame} className="flex flex-col items-center gap-1.5 px-4 py-2 rounded-xl hover:bg-black/5 transition-colors"> <IconShare size={20} /> <span className="text-[11px] font-bold font-serif uppercase tracking-widest">Share</span> </button>
                            {!isEnded && <button onClick={pass} className="flex flex-col items-center gap-1.5 px-8 py-2 rounded-xl transition-all duration-300 shadow-sm" style={{ backgroundColor: lastPassed && lastPassed !== currentPlayer ? C.amber : (mustPass ? C.text : 'rgba(0,0,0,0.05)'), color: (lastPassed && lastPassed !== currentPlayer) || mustPass ? '#fff' : C.text }}> <IconSkip size={20} /> <span className="text-[11px] font-bold font-serif uppercase tracking-widest">{lastPassed && lastPassed !== currentPlayer ? 'End Game' : 'Pass'}</span> </button>}
                            <button onClick={() => setPhase('setup')} className="flex flex-col items-center gap-1.5 px-4 py-2 rounded-xl hover:bg-black/5 transition-colors"> <IconRefresh size={20} /> <span className="text-[11px] font-bold font-serif uppercase tracking-widest">New</span> </button>
                        </div>
                    </div>
                    {showRules && <RulesModal onClose={() => setShowRules(false)} />}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
