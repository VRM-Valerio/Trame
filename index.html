<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRAME</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        body { font-family: 'Crimson Pro', serif; margin: 0; overflow: hidden; background-color: #f4ede0; height: 100dvh; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        svg { user-select: none; -webkit-user-select: none; touch-action: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #c9b89a; border-radius: 10px; }
        .tile-shadow { filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.25)); }
        .glass-panel { background: rgba(250, 246, 237, 0.95); backdrop-filter: blur(8px); }
        .toast-enter { animation: fadeUp 0.3s forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CELL = 100;
        const C = {
            black: '#1a1815', amber: '#b8500e', bg: '#f4ede0',
            bgLight: '#faf6ed', bgDark: '#e8dcc0', text: '#3a2e1f',
            textMuted: '#8b7a5e', line: '#c9b89a',
        };

        const IconSkip = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>;
        const IconRefresh = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>;
        const IconInfo = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconX = ({size=22}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconTrophy = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconChevronLeft = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const IconChevronRight = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const IconChevronsLeft = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>;
        const IconChevronsRight = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 17 5-5-5-5"/><path d="m13 17 5-5-5-5"/></svg>;
        const IconShare = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>;

        function analyzeBoard(tiles) {
            const tileKeys = Object.keys(tiles);
            const emptyState = {
                dead: new Set(), territoriesByColor: { black: new Set(), amber: new Set() },
                prisonersByColor: { black: new Set(), amber: new Set() }, closedCells: new Set(), territories: [],
                breakdown: { black: { vacant: 0, prisoners: 0 }, amber: { vacant: 0, prisoners: 0 } },
            };
            if (tileKeys.length === 0) return emptyState;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const k of tileKeys) {
                const [x, y] = k.split(',').map(Number);
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
            minX -= 1; maxX += 1; minY -= 1; maxY += 1;
            const inBox = (x, y) => x >= minX && x <= maxX && y >= minY && y <= maxY;

            const exterior = new Set();
            const q = [];
            for (let x = minX; x <= maxX; x++) {
                for (const y of [minY, maxY]) {
                    const k = `${x},${y}`; if (!tiles[k]) { exterior.add(k); q.push([x, y]); }
                }
            }
            for (let y = minY; y <= maxY; y++) {
                for (const x of [minX, maxX]) {
                    const k = `${x},${y}`; if (!tiles[k] && !exterior.has(k)) { exterior.add(k); q.push([x, y]); }
                }
            }
            while (q.length) {
                const [x, y] = q.pop();
                for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                    const nx = x + dx, ny = y + dy;
                    if (!inBox(nx, ny)) continue;
                    const nk = `${nx},${ny}`;
                    if (!tiles[nk] && !exterior.has(nk)) { exterior.add(nk); q.push([nx, ny]); }
                }
            }

            const dead = new Set();
            const checkedStones = new Set();
            for (const startKey of tileKeys) {
                if (checkedStones.has(startKey)) continue;
                const startColor = tiles[startKey], componentStones = new Set(), stack = [startKey];
                let isAlive = false;
                while (stack.length) {
                    const k = stack.pop();
                    if (checkedStones.has(k)) continue;
                    checkedStones.add(k); componentStones.add(k);
                    const [cx, cy] = k.split(',').map(Number);
                    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                        const nx = cx + dx, ny = cy + dy, nk = `${nx},${ny}`;
                        if (!tiles[nk]) { isAlive = true; } 
                        else if (tiles[nk] === startColor) { if (!checkedStones.has(nk)) stack.push(nk); }
                    }
                }
                if (!isAlive) { for (const stoneKey of componentStones) dead.add(stoneKey); }
            }

            const territoriesByColor = { black: new Set(), amber: new Set() }, prisonersByColor = { black: new Set(), amber: new Set() }, closedCells = new Set(), territories = [];
            const findTerritories = (owner, opponent) => {
                const visitedRegion = new Set();
                for (let x = minX; x <= maxX; x++) {
                    for (let y = minY; y <= maxY; y++) {
                        const k = `${x},${y}`;
                        if (visitedRegion.has(k) || exterior.has(k)) continue;
                        const isWalkable = !tiles[k] || (tiles[k] === opponent && dead.has(k));
                        if (!isWalkable) continue;
                        const regionCells = [], boundaryColors = new Set(), stack = [[x, y]];
                        visitedRegion.add(k);
                        while (stack.length) {
                            const [cx, cy] = stack.pop(), ck = `${cx},${cy}`;
                            regionCells.push(ck);
                            for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                                const nx = cx + dx, ny = cy + dy; if (!inBox(nx, ny)) continue;
                                const nk = `${nx},${ny}`;
                                if (exterior.has(nk)) { boundaryColors.add('exterior'); continue; }
                                const nIsWalkable = !tiles[nk] || (tiles[nk] === opponent && dead.has(nk));
                                if (nIsWalkable) { if (!visitedRegion.has(nk)) { visitedRegion.add(nk); stack.push([nx, ny]); } } 
                                else { boundaryColors.add(tiles[nk]); }
                            }
                        }
                        if (boundaryColors.size === 1 && boundaryColors.has(owner)) {
                            for (const ck of regionCells) {
                                territoriesByColor[owner].add(ck);
                                if (tiles[ck] === opponent) prisonersByColor[owner].add(ck);
                                closedCells.add(ck);
                            }
                            territories.push({ owner, cells: regionCells });
                        }
                    }
                }
            };
            findTerritories('black', 'amber'); findTerritories('amber', 'black');
            return { dead, territoriesByColor, prisonersByColor, closedCells, territories,
                breakdown: { black: { vacant: territoriesByColor.black.size, prisoners: prisonersByColor.black.size },
                             amber: { vacant: territoriesByColor.amber.size, prisoners: prisonersByColor.amber.size } } };
        }

        function PlayerBadge({ color, left, active, score }) {
            const pc = color === 'black' ? C.black : C.amber;
            return (
                <div className={`flex items-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg transition-all duration-300 ${active ? 'shadow-md scale-105' : 'opacity-80 scale-100'}`} style={{ backgroundColor: active ? pc : 'transparent', color: active ? '#fff' : C.text, border: `2px solid ${active ? pc : C.line}` }}>
                    <div className="w-2.5 h-2.5 rounded-sm shadow-sm" style={{ backgroundColor: active ? '#fff' : pc }} />
                    <div className="flex flex-col leading-none">
                        <span className="text-[9px] tracking-tighter uppercase opacity-80 mb-0.5">{color}</span>
                        <div className="flex items-baseline gap-1">
                            <span className="text-sm sm:text-base font-bold tabular-nums">{Number.isInteger(score) ? score : Number(score).toFixed(1)}</span>
                            <span className="text-[10px] opacity-70 tabular-nums">· {left}</span>
                        </div>
                    </div>
                </div>
            );
        }

        function RulesModal({ onClose }) {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity backdrop-blur-sm" style={{ backgroundColor: 'rgba(0,0,0,0.4)' }} onClick={onClose}>
                    <div className="w-full max-w-lg max-h-[85vh] overflow-y-auto rounded-2xl shadow-2xl transform transition-all" style={{ backgroundColor: C.bgLight, color: C.text }} onClick={(e) => e.stopPropagation()}>
                        <div className="sticky top-0 flex items-center justify-between p-4 sm:p-5 border-b glass-panel z-10" style={{ borderColor: C.line }}>
                            <h2 className="font-serif text-xl sm:text-2xl font-bold tracking-widest text-amber-900 uppercase">Trame Rules</h2>
                            <button onClick={onClose} className="p-2 rounded-full hover:bg-black/5 transition-colors"><IconX size={24} /></button>
                        </div>
                        <div className="p-5 sm:p-6 space-y-6 text-sm sm:text-base leading-relaxed font-serif">
                            <p><strong>Trame</strong> is an abstract game by Valerio Romolo Molino.</p>
                            <div><strong>1. Placement:</strong> Tiles must be side-to-side adjacent. No placement in 4-sided holes unless it completes a circuit.</div>
                            <div><strong>2. Scoring:</strong> +1 for each empty unit and +1 for each trapped opponent tile inside your sealed area.</div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [phase, setPhase] = useState('setup'), [tilesInput, setTilesInput] = useState('35'), [komiInput, setKomiInput] = useState('0'), [komiTo, setKomiTo] = useState('black');
            const [history, setHistory] = useState([]), [currentStep, setCurrentStep] = useState(0), [showRules, setShowRules] = useState(false), [toast, setToast] = useState('');

            useEffect(() => {
                const hash = window.location.hash;
                if (hash && hash.startsWith('#t=')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const t = params.get('t'), k = params.get('k'), kt = params.get('kt'), m = params.get('m'), s = params.get('s');
                    if (t) setTilesInput(t); if (k) setKomiInput(k); if (kt) setKomiTo(kt);
                    if (m) {
                        const loadedHistory = []; let p = 'black'; const moves = m.split(';').filter(Boolean);
                        for (const moveStr of moves) {
                            if (moveStr === 'p') loadedHistory.push({ type: 'pass', player: p });
                            else loadedHistory.push({ type: 'place', player: p, key: moveStr });
                            p = p === 'black' ? 'amber' : 'black';
                        }
                        setHistory(loadedHistory); setCurrentStep(s ? Math.min(parseInt(s), loadedHistory.length) : loadedHistory.length); setPhase('playing');
                    }
                }
            }, []);

            const { tiles, currentPlayer, blackLeft, amberLeft, lastPassed, consecutivePasses } = useMemo(() => {
                let t = {}, p = 'black', bl = Number(tilesInput) || 35, al = Number(tilesInput) || 35, lp = null, passCount = 0;
                for(let i = 0; i < currentStep; i++) {
                    const m = history[i];
                    if(m.type === 'place') { t[m.key] = m.player; if(m.player === 'black') bl--; else al--; lp = null; passCount = 0; } 
                    else if (m.type === 'pass') { lp = m.player; passCount++; }
                    p = p === 'black' ? 'amber' : 'black';
                }
                return { tiles: t, currentPlayer: p, blackLeft: bl, amberLeft: al, lastPassed: lp, consecutivePasses: passCount };
            }, [history, currentStep, tilesInput]);

            const analysis = useMemo(() => analyzeBoard(tiles), [tiles]);
            const scoring = useMemo(() => {
                const k = Number(komiInput) || 0;
                const b = analysis.breakdown.black.vacant + analysis.breakdown.black.prisoners + (komiTo === 'black' ? k : 0);
                const a = analysis.breakdown.amber.vacant + analysis.breakdown.amber.prisoners + (komiTo === 'amber' ? k : 0);
                return { black: b, amber: a };
            }, [analysis, komiInput, komiTo]);

            const isEnded = (blackLeft <= 0 && amberLeft <= 0) || consecutivePasses >= 2;

            const validPlacements = useMemo(() => {
                const tileKeys = Object.keys(tiles); if (tileKeys.length === 0) return new Set(['0,0']);
                const valid = new Set(), candidates = new Set();
                for (const key of tileKeys) {
                    const [x, y] = key.split(',').map(Number);
                    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                        const nx = x + dx, ny = y + dy, k = `${nx},${ny}`;
                        if (!tiles[k] && !analysis.closedCells.has(k)) candidates.add(k);
                    }
                }
                for (const k of candidates) {
                    const [x, y] = k.split(',').map(Number);
                    let occ = 0; for (const [ddx, ddy] of [[1,0],[-1,0],[0,1],[0,-1]]) if (tiles[`${x+ddx},${y+ddy}`]) occ++;
                    if (occ < 4) { valid.add(k); } 
                    else {
                        const simTiles = { ...tiles, [k]: currentPlayer }, simAnalysis = analyzeBoard(simTiles);
                        if (simAnalysis.territoriesByColor[currentPlayer].size > analysis.territoriesByColor[currentPlayer].size || 
                            simAnalysis.prisonersByColor[currentPlayer].size > analysis.prisonersByColor[currentPlayer].size) { valid.add(k); }
                    }
                }
                return valid;
            }, [tiles, analysis, currentPlayer]);

            const tilesLeftForCurrent = currentPlayer === 'black' ? blackLeft : amberLeft;
            const mustPass = !isEnded && (tilesLeftForCurrent <= 0 || validPlacements.size === 0);

            const startGame = () => { setHistory([]); setCurrentStep(0); setPhase('playing'); window.location.hash = ''; };
            const executeMove = (moveObj) => { const newHistory = history.slice(0, currentStep); newHistory.push(moveObj); setHistory(newHistory); setCurrentStep(newHistory.length); };
            const placeTile = (key) => { if (isEnded || phase !== 'playing' || !validPlacements.has(key) || tilesLeftForCurrent <= 0) return; executeMove({ type: 'place', player: currentPlayer, key }); };
            const pass = () => { if (isEnded || phase !== 'playing') return; executeMove({ type: 'pass', player: currentPlayer }); };

            const shareGame = () => {
                // Forking logic: only share history up to current view
                const slicedHistory = history.slice(0, currentStep);
                const movesStr = slicedHistory.map(h => h.type === 'pass' ? 'p' : h.key).join(';');
                const hash = `t=${tilesInput}&k=${komiInput}&kt=${komiTo}&m=${movesStr}`;
                const origin = window.location.origin === 'null' ? '' : window.location.origin;
                const url = origin + window.location.pathname + '#' + hash;
                navigator.clipboard.writeText(url).then(() => { setToast('Link copied (Snapshot at Move ' + currentStep + ')'); setTimeout(() => setToast(''), 3000); })
                .catch(() => { setToast('Check console for link'); setTimeout(() => setToast(''), 3000); });
            };

            const bbox = useMemo(() => {
                const tk = Object.keys(tiles); if (tk.length === 0) return { minX: -3, maxX: 3, minY: -3, maxY: 3 };
                let x1=Infinity, x2=-Infinity, y1=Infinity, y2=-Infinity;
                tk.forEach(k => { const [x, y] = k.split(',').map(Number); x1=Math.min(x1,x); x2=Math.max(x2,x); y1=Math.min(y1,y); y2=Math.max(y2,y); });
                return { minX: x1-2, maxX: x2+2, minY: y1-2, maxY: y2+2 };
            }, [tiles]);

            if (phase === 'setup') {
                return (
                    <div className="flex flex-col h-full items-center justify-center p-6 bg-[#faf6ed]" style={{ color: C.text }}>
                        <div className="w-full max-w-sm bg-white/40 p-6 sm:p-8 rounded-3xl shadow-xl border border-white/50 backdrop-blur-md">
                            <h1 className="font-serif text-4xl sm:text-5xl font-bold tracking-[0.3em] mb-3 text-center text-amber-900">TRAME</h1>
                            <div className="space-y-4 mb-6">
                                <div className="rounded-2xl p-4 bg-white/60 border border-[#c9b89a]">
                                    <p className="text-[10px] font-bold tracking-widest uppercase mb-1 opacity-60">Tiles per player</p>
                                    <input type="number" value={tilesInput} onChange={e => setTilesInput(e.target.value)} className="w-full bg-transparent font-bold text-xl outline-none" />
                                </div>
                                <div className="rounded-2xl p-4 bg-white/60 border border-[#c9b89a]">
                                    <p className="text-[10px] font-bold tracking-widest uppercase mb-1 opacity-60">Komi (Compensation)</p>
                                    <input type="number" step="0.5" value={komiInput} onChange={e => setKomiInput(e.target.value)} className="w-full bg-transparent font-bold text-xl outline-none mb-2" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setKomiTo('black')} className={`py-1.5 rounded-lg text-[11px] font-bold uppercase transition-all ${komiTo === 'black' ? 'bg-[#1a1815] text-white' : 'border border-[#c9b89a]'}`}>To Black</button>
                                        <button onClick={() => setKomiTo('amber')} className={`py-1.5 rounded-lg text-[11px] font-bold uppercase transition-all ${komiTo === 'amber' ? 'bg-[#b8500e] text-white' : 'border border-[#c9b89a]'}`}>To Amber</button>
                                    </div>
                                </div>
                            </div>
                            <button onClick={startGame} className="w-full py-4 rounded-xl font-bold tracking-widest text-white shadow-lg bg-[#b8500e] hover:scale-[1.02] active:scale-[0.98] transition-transform uppercase">Start Game</button>
                        </div>
                    </div>
                );
            }

            const viewBox = `${bbox.minX * CELL} ${bbox.minY * CELL} ${(bbox.maxX - bbox.minX + 1) * CELL} ${(bbox.maxY - bbox.minY + 1) * CELL}`;
            let statusText = `Turn: ${currentPlayer.toUpperCase()}`;
            if (currentStep < history.length && !isEnded) statusText = `Snapshot: Move ${currentStep}`;
            else if (mustPass) statusText = 'Must Pass - No moves left';
            else if (lastPassed && !isEnded) statusText = 'Opponent Passed';
            const winner = isEnded ? (scoring.black > scoring.amber ? 'black' : scoring.amber > scoring.black ? 'amber' : 'tie') : null;
            const fmt = (n) => Number.isInteger(n) ? n : Number(n).toFixed(1);

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <div className="flex items-center justify-between px-3 py-2 border-b bg-[#faf6ed] z-10 shrink-0">
                        <h1 className="font-serif text-sm font-bold tracking-[0.2em] opacity-40">TRAME</h1>
                        <div className="flex items-center gap-1.5 sm:gap-3">
                            <PlayerBadge color="black" left={blackLeft} active={!isEnded && currentPlayer === 'black'} score={scoring.black} />
                            <PlayerBadge color="amber" left={amberLeft} active={!isEnded && currentPlayer === 'amber'} score={scoring.amber} />
                            <button onClick={() => setShowRules(true)} className="p-1.5 opacity-40"><IconInfo /></button>
                        </div>
                    </div>

                    {!isEnded && <div className={`py-1 text-[10px] text-center font-bold tracking-[0.2em] uppercase shrink-0 ${currentStep < history.length ? 'bg-amber-200' : 'bg-[#e8dcc0]'}`} style={{ color: C.text }}>{statusText}</div>}
                    {isEnded && (
                        <div className="py-2 text-center shadow-md z-10 shrink-0 font-bold tracking-widest text-xs uppercase" style={{ backgroundColor: winner === 'tie' ? C.bgDark : (winner === 'black' ? C.black : C.amber), color: winner === 'tie' ? C.text : '#fff' }}>
                            {winner === 'tie' ? `Draw: ${fmt(scoring.black)} - ${fmt(scoring.amber)}` : `${winner} Wins: ${fmt(scoring.black)} - ${fmt(scoring.amber)}`}
                        </div>
                    )}

                    <div className="grow min-h-0 relative bg-[#f4ede0]">
                        <svg viewBox={viewBox} className="absolute inset-0 w-full h-full" preserveAspectRatio="xMidYMid meet">
                            {Array.from({ length: bbox.maxX - bbox.minX + 2 }, (_, i) => <line key={`gx${i}`} x1={(bbox.minX + i) * CELL} y1={bbox.minY * CELL} x2={(bbox.minX + i) * CELL} y2={(bbox.maxY + 1) * CELL} stroke={C.line} strokeWidth="1" opacity="0.3" />)}
                            {Array.from({ length: bbox.maxY - bbox.minY + 2 }, (_, i) => <line key={`gy${i}`} x1={bbox.minX * CELL} y1={(bbox.minY + i) * CELL} x2={(bbox.maxX + 1) * CELL} y2={(bbox.minY + i) * CELL} stroke={C.line} strokeWidth="1" opacity="0.3" />)}
                            {analysis.territories.map((t, ti) => t.cells.map((cellKey) => { const [x, y] = cellKey.split(',').map(Number); return <rect key={`t${ti}_${cellKey}`} x={x * CELL} y={y * CELL} width={CELL} height={CELL} fill={t.owner === 'black' ? C.black : C.amber} opacity={!isEnded ? 0.1 : 0.2} />; }))}
                            {Object.entries(tiles).map(([k, color]) => {
                                const [x, y] = k.split(',').map(Number), isDead = analysis.dead.has(k);
                                return ( <g key={k} pointerEvents="none"> <rect x={x * CELL + 4} y={y * CELL + 4} width={CELL - 8} height={CELL - 8} fill={color === 'black' ? C.black : C.amber} rx="12" opacity={isDead ? 0.4 : 1} className="tile-shadow" /> {isDead && ( <g opacity="0.8"> <line x1={x * CELL + 35} y1={y * CELL + 35} x2={x * CELL + 65} y2={y * CELL + 65} stroke="#fff" strokeWidth="6" strokeLinecap="round" /> <line x1={x * CELL + 65} y1={y * CELL + 35} x2={x * CELL + 35} y2={y * CELL + 65} stroke="#fff" strokeWidth="6" strokeLinecap="round" /> </g> )} </g> );
                            })}
                            {!isEnded && Array.from(validPlacements).map((k) => {
                                const [x, y] = k.split(',').map(Number);
                                return ( <rect key={`v${k}`} x={x * CELL + 20} y={y * CELL + 20} width={CELL - 40} height={CELL - 40} fill={currentPlayer === 'black' ? C.black : C.amber} opacity="0.15" rx="10" onClick={() => placeTile(k)} style={{ cursor: 'pointer' }} /> );
                            })}
                        </svg>
                        {toast && <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded-full text-[10px] uppercase font-bold z-50 shadow-xl"> {toast} </div>}
                    </div>

                    <div className="shrink-0 flex flex-col bg-[#faf6ed] border-t border-[#c9b89a]">
                        <div className="flex items-center justify-between px-4 py-1.5 border-b border-[#c9b89a]/30">
                            <div className="flex gap-1">
                                <button onClick={() => setCurrentStep(0)} disabled={currentStep === 0} className="p-1 opacity-50 disabled:opacity-10"><IconChevronsLeft /></button>
                                <button onClick={() => setCurrentStep(s => Math.max(0, s - 1))} disabled={currentStep === 0} className="p-1 opacity-50 disabled:opacity-10"><IconChevronLeft /></button>
                            </div>
                            <span className="text-[10px] font-bold opacity-30 tabular-nums uppercase">Move {currentStep} of {history.length}</span>
                            <div className="flex gap-1">
                                <button onClick={() => setCurrentStep(s => Math.min(history.length, s + 1))} disabled={currentStep === history.length} className="p-1 opacity-50 disabled:opacity-10"><IconChevronRight /></button>
                                <button onClick={() => setCurrentStep(history.length)} disabled={currentStep === history.length} className="p-1 opacity-50 disabled:opacity-10"><IconChevronsRight /></button>
                            </div>
                        </div>
                        <div className="flex items-center justify-around py-3 px-2">
                            <button onClick={shareGame} className="flex flex-col items-center gap-1 opacity-50 px-3"><IconShare /><span className="text-[9px] uppercase font-bold">Share</span></button>
                            {!isEnded && <button onClick={pass} className={`flex flex-col items-center gap-1 px-8 py-2 rounded-xl shadow-md transition-all ${lastPassed ? 'bg-[#b8500e] text-white scale-105' : 'bg-black/5'}`}><IconSkip /><span className="text-[9px] uppercase font-bold">{lastPassed ? 'End Game' : 'Pass'}</span></button>}
                            <button onClick={() => setPhase('setup')} className="flex flex-col items-center gap-1 opacity-50 px-3"><IconRefresh /><span className="text-[9px] uppercase font-bold">New</span></button>
                        </div>
                    </div>
                    {showRules && <RulesModal onClose={() => setShowRules(false)} />}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
